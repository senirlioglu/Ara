<!DOCTYPE html>
<html>
<head>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: #f8f9fa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow-x: hidden; }

  /* Slider container */
  #slider {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 8px;
  }

  /* Arrow buttons */
  .arrow {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: #1e3a5f;
    color: #fff;
    font-size: 22px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  .arrow:hover { background: #2a5080; }
  .arrow:disabled { background: #ccc; cursor: default; box-shadow: none; }

  /* Page wrapper */
  #page-wrap {
    position: relative;
    display: inline-block;
    max-width: calc(100% - 110px);
  }
  #page-wrap img {
    display: block;
    max-width: 100%;
    height: auto;
    border-radius: 4px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.12);
  }

  /* Hotspot overlay */
  .hotspot {
    position: absolute;
    border: 2px solid rgba(30, 58, 95, 0.6);
    background: rgba(30, 58, 95, 0.08);
    cursor: pointer;
    z-index: 5;
    transition: background 0.2s, border-color 0.2s;
  }
  .hotspot:hover {
    background: rgba(30, 58, 95, 0.22);
    border-color: #1e3a5f;
  }
  .hotspot.active {
    border-color: #ff4444;
    background: rgba(255, 68, 68, 0.15);
    border-width: 3px;
  }

  /* Hotspot label */
  .hotspot-label {
    position: absolute;
    top: -20px;
    left: 0;
    background: #1e3a5f;
    color: #fff;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 2px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .hotspot:hover .hotspot-label,
  .hotspot.active .hotspot-label {
    opacity: 1;
  }

  /* Product popup */
  #popup {
    display: none;
    position: fixed;
    z-index: 100;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.18);
    padding: 16px 20px;
    min-width: 240px;
    max-width: 340px;
    border: 1px solid #e0e0e0;
  }
  #popup.visible { display: block; }
  #popup .popup-code {
    font-size: 18px;
    font-weight: 700;
    color: #1e3a5f;
    margin-bottom: 4px;
  }
  #popup .popup-desc {
    font-size: 14px;
    color: #555;
    line-height: 1.4;
  }
  #popup .popup-price {
    font-size: 16px;
    font-weight: 700;
    color: #e53935;
    margin-top: 6px;
  }
  #popup .popup-close {
    position: absolute;
    top: 8px;
    right: 10px;
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    color: #999;
    line-height: 1;
  }
  #popup .popup-close:hover { color: #333; }

  /* Page indicator */
  #page-info {
    text-align: center;
    padding: 8px;
    font-size: 14px;
    color: #555;
    font-weight: 500;
  }

  /* Dot indicator */
  #dots {
    display: flex;
    justify-content: center;
    gap: 6px;
    padding-bottom: 8px;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #ccc;
    cursor: pointer;
    transition: background 0.2s;
  }
  .dot.active { background: #1e3a5f; }
  .dot:hover { background: #2a5080; }
</style>
</head>
<body>

<div id="page-info"></div>
<div id="slider">
  <button class="arrow" id="btnPrev">&#8249;</button>
  <div id="page-wrap">
    <img id="img" />
  </div>
  <button class="arrow" id="btnNext">&#8250;</button>
</div>
<div id="dots"></div>
<div id="popup">
  <button class="popup-close" id="popupClose">&times;</button>
  <div class="popup-code" id="popupCode"></div>
  <div class="popup-desc" id="popupDesc"></div>
  <div class="popup-price" id="popupPrice"></div>
</div>

<script>
/* ================================================================
   Poster Viewer — Streamlit Custom Component
   Slider with interactive hotspots
   ================================================================ */

function sendValue(data) {
  window.parent.postMessage({
    isStreamlitMessage: true,
    type: "streamlit:setComponentValue",
    value: data
  }, "*");
}
function setFrameHeight() {
  window.parent.postMessage({
    isStreamlitMessage: true,
    type: "streamlit:setFrameHeight",
    height: document.body.scrollHeight + 16
  }, "*");
}

var img       = document.getElementById("img");
var pageWrap  = document.getElementById("page-wrap");
var pageInfo  = document.getElementById("page-info");
var dotsWrap  = document.getElementById("dots");
var btnPrev   = document.getElementById("btnPrev");
var btnNext   = document.getElementById("btnNext");
var popup     = document.getElementById("popup");
var popupCode = document.getElementById("popupCode");
var popupDesc = document.getElementById("popupDesc");
var popupPrice= document.getElementById("popupPrice");
var popupClose= document.getElementById("popupClose");

var pages      = [];     /* [{image_b64, hotspots: [{x0,y0,x1,y1,urun_kodu,urun_ad,afis_fiyat}]}] */
var currentIdx = 0;
var activeHotspot = null;

/* ── Receive data from Streamlit ── */
window.addEventListener("message", function(event) {
  if (!event.data || event.data.type !== "streamlit:render") return;
  var args = event.data.args;
  if (!args) return;

  pages = args.pages || [];
  currentIdx = args.current_index || 0;

  if (pages.length === 0) {
    pageInfo.textContent = "Henüz poster yüklenmedi";
    img.src = "";
    return;
  }

  buildDots();
  showPage(currentIdx);
});

function buildDots() {
  dotsWrap.innerHTML = "";
  /* Only show dots if <= 20 pages for readability */
  if (pages.length <= 20) {
    for (var i = 0; i < pages.length; i++) {
      var d = document.createElement("span");
      d.className = "dot";
      d.dataset.idx = i;
      d.addEventListener("click", function() {
        goTo(parseInt(this.dataset.idx));
      });
      dotsWrap.appendChild(d);
    }
  }
}

function showPage(idx) {
  if (idx < 0 || idx >= pages.length) return;
  currentIdx = idx;
  var pg = pages[idx];

  /* Update image */
  var src = "data:image/jpeg;base64," + pg.image_b64;
  if (img.src !== src) {
    img.onload = function() {
      renderHotspots(pg.hotspots || []);
      setFrameHeight();
    };
    img.src = src;
  } else {
    renderHotspots(pg.hotspots || []);
  }

  /* Update nav */
  pageInfo.textContent = pg.label || ("Sayfa " + (idx + 1) + " / " + pages.length);
  btnPrev.disabled = (idx === 0);
  btnNext.disabled = (idx === pages.length - 1);

  /* Update dots */
  var dots = dotsWrap.querySelectorAll(".dot");
  dots.forEach(function(d, i) {
    d.classList.toggle("active", i === idx);
  });

  /* Close popup */
  closePopup();

  /* Notify Streamlit of current page */
  sendValue({type: "page_change", index: idx});
}

function renderHotspots(hotspots) {
  /* Clear old */
  pageWrap.querySelectorAll(".hotspot").forEach(function(el) { el.remove(); });

  var iw = img.clientWidth, ih = img.clientHeight;
  if (iw === 0 || ih === 0) return;

  for (var i = 0; i < hotspots.length; i++) {
    var h = hotspots[i];
    var div = document.createElement("div");
    div.className = "hotspot";
    div.style.left   = (h.x0 * iw) + "px";
    div.style.top    = (h.y0 * ih) + "px";
    div.style.width  = ((h.x1 - h.x0) * iw) + "px";
    div.style.height = ((h.y1 - h.y0) * ih) + "px";
    div.dataset.idx = i;

    /* Label */
    var lbl = document.createElement("span");
    lbl.className = "hotspot-label";
    lbl.textContent = h.urun_kodu || "?";
    div.appendChild(lbl);

    /* Click handler */
    div.addEventListener("click", (function(hotspot, el) {
      return function(e) {
        e.stopPropagation();
        showPopup(hotspot, el);
      };
    })(h, div));

    pageWrap.appendChild(div);
  }
}

function showPopup(h, el) {
  /* Deactivate previous */
  if (activeHotspot) activeHotspot.classList.remove("active");
  el.classList.add("active");
  activeHotspot = el;

  popupCode.textContent = h.urun_kodu || "—";
  popupDesc.textContent = h.urun_ad || "";
  popupPrice.textContent = h.afis_fiyat ? (h.afis_fiyat + " TL") : "";
  popupPrice.style.display = h.afis_fiyat ? "block" : "none";

  /* Position popup near the hotspot */
  var rect = el.getBoundingClientRect();
  var pw = 280;
  var left = rect.right + 10;
  if (left + pw > window.innerWidth) {
    left = rect.left - pw - 10;
  }
  if (left < 0) left = 10;
  var top = rect.top;
  if (top + 120 > window.innerHeight) {
    top = window.innerHeight - 130;
  }

  popup.style.left = left + "px";
  popup.style.top  = top + "px";
  popup.classList.add("visible");
}

function closePopup() {
  popup.classList.remove("visible");
  if (activeHotspot) {
    activeHotspot.classList.remove("active");
    activeHotspot = null;
  }
}

/* Close popup on click outside */
document.addEventListener("click", function(e) {
  if (!popup.contains(e.target) && !e.target.classList.contains("hotspot")) {
    closePopup();
  }
});
popupClose.addEventListener("click", closePopup);

/* Navigation */
btnPrev.addEventListener("click", function() { goTo(currentIdx - 1); });
btnNext.addEventListener("click", function() { goTo(currentIdx + 1); });

function goTo(idx) {
  if (idx >= 0 && idx < pages.length) showPage(idx);
}

/* Keyboard navigation */
document.addEventListener("keydown", function(e) {
  if (e.key === "ArrowLeft") goTo(currentIdx - 1);
  else if (e.key === "ArrowRight") goTo(currentIdx + 1);
  else if (e.key === "Escape") closePopup();
});

/* Touch/swipe support */
var touchStartX = 0;
document.addEventListener("touchstart", function(e) {
  touchStartX = e.touches[0].clientX;
});
document.addEventListener("touchend", function(e) {
  var dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) {
    if (dx > 0) goTo(currentIdx - 1);
    else goTo(currentIdx + 1);
  }
});

/* Boot */
window.parent.postMessage({
  isStreamlitMessage: true,
  type: "streamlit:componentReady",
  apiVersion: 1
}, "*");
</script>
</body>
</html>
