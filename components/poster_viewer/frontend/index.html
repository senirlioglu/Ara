<!DOCTYPE html>
<html>
<head>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: visible; }

  /* Slider container */
  #slider {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 0 2px;
  }

  /* Arrow buttons */
  .arrow {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: rgba(30, 58, 95, 0.85);
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, opacity 0.2s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    z-index: 10;
  }
  .arrow:hover { background: rgba(30, 58, 95, 1); }
  .arrow:disabled { opacity: 0.3; cursor: default; box-shadow: none; }

  /* Page wrapper */
  #page-wrap {
    position: relative;
    display: inline-block;
    max-width: calc(100% - 80px);
    flex: 1;
    overflow: hidden;
    border-radius: 6px;
  }
  #slide-track {
    position: relative;
    width: 100%;
    will-change: transform;
    touch-action: pan-y;
  }
  #slide-track.animating {
    transition: transform 0.3s ease;
  }

  /* Zoom container — wraps the image and hotspots */
  #zoom-container {
    position: relative;
    width: 100%;
    transform-origin: 0 0;
    will-change: transform;
  }
  #zoom-container.zoom-animating {
    transition: transform 0.25s ease;
  }

  #page-wrap img {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 6px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.10);
    user-select: none;
    -webkit-user-drag: none;
  }

  /* Hotspot overlay */
  .hotspot {
    position: absolute;
    border: 2px solid rgba(30, 58, 95, 0.5);
    background: rgba(30, 58, 95, 0.06);
    cursor: pointer;
    z-index: 5;
    transition: background 0.2s, border-color 0.2s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: rgba(30, 58, 95, 0.2);
  }
  .hotspot:hover {
    background: rgba(30, 58, 95, 0.2);
    border-color: #1e3a5f;
  }
  .hotspot.active {
    border-color: #ff4444;
    background: rgba(255, 68, 68, 0.15);
    border-width: 3px;
  }

  /* Search mode: invisible hotspot — no border, no background, but clickable */
  .hotspot.search-mode {
    border: none;
    background: transparent;
    cursor: pointer;
  }
  .hotspot.search-mode:hover {
    background: rgba(30, 58, 95, 0.08);
    border: none;
  }

  /* Hotspot label */
  .hotspot-label {
    position: absolute;
    top: -18px;
    left: 0;
    background: #1e3a5f;
    color: #fff;
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 2px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .hotspot:hover .hotspot-label,
  .hotspot.active .hotspot-label {
    opacity: 1;
  }
  /* Search mode: hide label completely */
  .hotspot.search-mode .hotspot-label {
    display: none;
  }

  /* Magnifying glass icon — bottom-right of hotspot, size set dynamically via JS */
  .hotspot-search-btn {
    position: absolute;
    bottom: 2px;
    right: 2px;
    border-radius: 50%;
    border: none;
    background: rgba(255, 255, 255, 0.75);
    color: #333;
    cursor: pointer;
    z-index: 6;
    box-shadow: 0 1px 4px rgba(0,0,0,0.25);
    transition: background 0.2s, transform 0.15s;
    pointer-events: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .hotspot-search-btn:hover {
    background: rgba(255, 255, 255, 0.95);
    transform: scale(1.15);
  }
  .hotspot-search-btn:active {
    background: #e53935;
    transform: scale(0.95);
  }

  /* Product popup */
  #popup {
    display: none;
    position: fixed;
    z-index: 100;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.18);
    padding: 14px 18px;
    min-width: 220px;
    max-width: 300px;
    border: 1px solid #e0e0e0;
  }
  #popup.visible { display: block; }
  #popup .popup-code { font-size: 16px; font-weight: 700; color: #1e3a5f; margin-bottom: 3px; }
  #popup .popup-desc { font-size: 13px; color: #555; line-height: 1.4; }
  #popup .popup-price { font-size: 15px; font-weight: 700; color: #e53935; margin-top: 5px; }
  #popup .popup-close { position: absolute; top: 6px; right: 8px; background: none; border: none; font-size: 18px; cursor: pointer; color: #999; line-height: 1; }
  #popup .popup-close:hover { color: #333; }

  /* Dot indicator */
  #dots {
    display: flex;
    justify-content: center;
    gap: 5px;
    padding: 6px 0 2px;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ccc;
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
  }
  .dot.active { background: #1e3a5f; transform: scale(1.25); }
  .dot:hover { background: #2a5080; }

  /* Page counter */
  #page-counter {
    text-align: center;
    font-size: 12px;
    color: #888;
    padding: 2px 0;
  }

  /* Zoom reset button */
  #zoom-reset {
    display: none;
    position: absolute;
    top: 8px;
    right: 8px;
    z-index: 20;
    background: rgba(30, 58, 95, 0.85);
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }
  #zoom-reset:hover { background: rgba(30, 58, 95, 1); }

  @media (max-width: 500px) {
    .arrow { width: 30px; height: 30px; font-size: 16px; }
    #page-wrap { max-width: calc(100% - 66px); }
    .dot { width: 7px; height: 7px; }
  }
</style>
</head>
<body>

<div id="slider">
  <button class="arrow" id="btnPrev">&#8249;</button>
  <div id="page-wrap">
    <div id="slide-track">
      <div id="zoom-container">
        <img id="img" />
      </div>
    </div>
    <button id="zoom-reset">1x</button>
  </div>
  <button class="arrow" id="btnNext">&#8250;</button>
</div>
<div id="dots"></div>
<div id="page-counter"></div>
<div id="popup">
  <button class="popup-close" id="popupClose">&times;</button>
  <div class="popup-code" id="popupCode"></div>
  <div class="popup-desc" id="popupDesc"></div>
  <div class="popup-price" id="popupPrice"></div>
</div>

<script>
/* ================================================================
   Poster Viewer — Streamlit Custom Component
   Mobile-first slider with interactive hotspots + pinch-to-zoom
   ================================================================ */

function sendValue(data) {
  window.parent.postMessage({
    isStreamlitMessage: true,
    type: "streamlit:setComponentValue",
    value: data
  }, "*");
}
function setFrameHeight() {
  var h = document.body.scrollHeight;
  var imgH = img.clientHeight || img.naturalHeight || 0;
  var total = Math.max(h, imgH + 80);
  window.parent.postMessage({
    isStreamlitMessage: true,
    type: "streamlit:setFrameHeight",
    height: total
  }, "*");
}

var img        = document.getElementById("img");
var pageWrap   = document.getElementById("page-wrap");
var slideTrack = document.getElementById("slide-track");
var zoomContainer = document.getElementById("zoom-container");
var zoomResetBtn  = document.getElementById("zoom-reset");
var counter    = document.getElementById("page-counter");
var dotsWrap  = document.getElementById("dots");
var btnPrev   = document.getElementById("btnPrev");
var btnNext   = document.getElementById("btnNext");
var popup     = document.getElementById("popup");
var popupCode = document.getElementById("popupCode");
var popupDesc = document.getElementById("popupDesc");
var popupPrice= document.getElementById("popupPrice");
var popupClose= document.getElementById("popupClose");

var pages      = [];
var currentIdx = 0;
var activeHotspot = null;
var clickMode  = "popup";
var localNav   = false;   /* true when user navigated locally (skip Streamlit reset) */

/* ── Pinch-to-zoom state ── */
var zoomScale = 1;
var zoomX = 0;       /* translate X (CSS: translate(zoomX, zoomY) scale(zoomScale)) */
var zoomY = 0;       /* translate Y */
var pinching = false;
var pinchStartDist = 0;
var pinchStartScale = 1;
var pinchStartZoomX = 0, pinchStartZoomY = 0;
var pinchMidX = 0, pinchMidY = 0;
var panStartX = 0, panStartY = 0;
var panStartZoomX = 0, panStartZoomY = 0;
var isPanning = false;

function isZoomed() { return zoomScale > 1.05; }

function applyZoom(animate) {
  if (animate) {
    zoomContainer.classList.add("zoom-animating");
    setTimeout(function() { zoomContainer.classList.remove("zoom-animating"); }, 260);
  }
  zoomContainer.style.transform = "translate(" + zoomX + "px," + zoomY + "px) scale(" + zoomScale + ")";

  /* Toggle touch-action: when zoomed, we handle all touch; when not, allow vertical scroll */
  slideTrack.style.touchAction = isZoomed() ? "none" : "pan-y";

  /* Show/hide reset button */
  zoomResetBtn.style.display = isZoomed() ? "block" : "none";
}

function resetZoom(animate) {
  zoomScale = 1;
  zoomX = 0;
  zoomY = 0;
  applyZoom(animate);
}

/**
 * Zoom to newScale keeping focal point (fx, fy) in page-wrap coords fixed.
 * With transform-origin:0 0, point (px,py) maps to (tx + px*s, ty + py*s).
 * To keep (fx,fy) fixed: tx_new = fx - (fx - tx_old) * (s_new / s_old)
 */
function zoomTo(newScale, fx, fy) {
  var oldScale = zoomScale;
  var ratio = newScale / oldScale;
  zoomX = fx - (fx - zoomX) * ratio;
  zoomY = fy - (fy - zoomY) * ratio;
  zoomScale = newScale;
  clampPan();
}

function clampPan() {
  if (zoomScale <= 1) { zoomX = 0; zoomY = 0; return; }
  var wrapW = pageWrap.clientWidth;
  var wrapH = img.clientHeight || pageWrap.clientHeight;
  /* Max offset: allow panning the full scaled content within the viewport */
  var maxX = wrapW * (zoomScale - 1);
  var maxY = wrapH * (zoomScale - 1);
  zoomX = Math.max(-maxX, Math.min(0, zoomX));
  zoomY = Math.max(-maxY, Math.min(0, zoomY));
}

zoomResetBtn.addEventListener("click", function(e) {
  e.stopPropagation();
  resetZoom(true);
});

/* Double-tap to zoom */
var lastTapTime = 0;
var lastTapX = 0, lastTapY = 0;

pageWrap.addEventListener("touchend", function(e) {
  if (e.touches.length > 0) return; /* still fingers down */
  var now = Date.now();
  var touch = e.changedTouches[0];
  if (!touch) return;

  var dt = now - lastTapTime;
  var dx = Math.abs(touch.clientX - lastTapX);
  var dy = Math.abs(touch.clientY - lastTapY);

  if (dt < 350 && dx < 30 && dy < 30 && !isDragging) {
    /* Double tap detected */
    e.preventDefault();
    if (isZoomed()) {
      resetZoom(true);
    } else {
      /* Zoom to 2.5x centered on tap point */
      var rect = pageWrap.getBoundingClientRect();
      var tapX = touch.clientX - rect.left;
      var tapY = touch.clientY - rect.top;
      zoomTo(2.5, tapX, tapY);
      applyZoom(true);
    }
    lastTapTime = 0; /* prevent triple-tap */
    return;
  }
  lastTapTime = now;
  lastTapX = touch.clientX;
  lastTapY = touch.clientY;
});

/* ── Receive data from Streamlit ── */
window.addEventListener("message", function(event) {
  if (!event.data || event.data.type !== "streamlit:render") return;
  var args = event.data.args;
  if (!args) return;

  var newPages = args.pages || [];
  var newClickMode = args.click_mode || "popup";
  var serverIdx = args.current_index || 0;

  /* If user navigated locally, don't let Streamlit reset page index */
  if (localNav && newPages.length === pages.length) {
    pages = newPages;
    clickMode = newClickMode;
    /* Only re-render hotspots for current page (image unchanged) */
    var pg = pages[currentIdx];
    if (pg) renderHotspots(pg.hotspots || []);
    return;
  }

  /* Pages actually changed — full rebuild */
  pages = newPages;
  clickMode = newClickMode;
  localNav = false;

  if (pages.length === 0) {
    counter.textContent = "";
    img.src = "";
    return;
  }

  buildDots();
  showPage(serverIdx, false);
});

function buildDots() {
  dotsWrap.innerHTML = "";
  if (pages.length <= 20 && pages.length > 1) {
    for (var i = 0; i < pages.length; i++) {
      var d = document.createElement("span");
      d.className = "dot";
      d.dataset.idx = i;
      d.addEventListener("click", function() {
        goTo(parseInt(this.dataset.idx));
      });
      dotsWrap.appendChild(d);
    }
  }
}

function showPage(idx, fromUser) {
  if (idx < 0 || idx >= pages.length) return;
  currentIdx = idx;
  var pg = pages[idx];

  /* Reset zoom on page change */
  resetZoom(false);

  /* Update image */
  var src = "data:image/jpeg;base64," + pg.image_b64;
  if (img.src !== src) {
    img.onload = function() {
      renderHotspots(pg.hotspots || []);
      setFrameHeight();
      setTimeout(setFrameHeight, 200);
      setTimeout(setFrameHeight, 500);
    };
    img.src = src;
  } else {
    renderHotspots(pg.hotspots || []);
  }

  /* Update nav */
  if (pages.length > 1) {
    counter.textContent = (idx + 1) + " / " + pages.length;
  } else {
    counter.textContent = "";
  }
  btnPrev.disabled = (idx === 0);
  btnNext.disabled = (idx === pages.length - 1);

  /* Hide arrows if single page */
  btnPrev.style.visibility = pages.length <= 1 ? "hidden" : "visible";
  btnNext.style.visibility = pages.length <= 1 ? "hidden" : "visible";

  /* Update dots */
  var dots = dotsWrap.querySelectorAll(".dot");
  dots.forEach(function(d, i) {
    d.classList.toggle("active", i === idx);
  });

  /* Close popup */
  closePopup();

  if (fromUser) {
    localNav = true;
  }
}

function renderHotspots(hotspots) {
  zoomContainer.querySelectorAll(".hotspot").forEach(function(el) { el.remove(); });

  var iw = img.clientWidth, ih = img.clientHeight;
  if (iw === 0 || ih === 0) return;

  for (var i = 0; i < hotspots.length; i++) {
    var h = hotspots[i];
    var div = document.createElement("div");
    var hsW = (h.x1 - h.x0) * iw;
    var hsH = (h.y1 - h.y0) * ih;
    div.className = clickMode === "search" ? "hotspot search-mode" : "hotspot";
    div.style.left   = (h.x0 * iw) + "px";
    div.style.top    = (h.y0 * ih) + "px";
    div.style.width  = hsW + "px";
    div.style.height = hsH + "px";
    div.dataset.idx = i;

    var lbl = document.createElement("span");
    lbl.className = "hotspot-label";
    lbl.textContent = h.urun_kodu || "?";
    div.appendChild(lbl);

    if (clickMode === "search") {
      /* Entire hotspot area is clickable in search mode */
      div.style.cursor = "pointer";
      div.addEventListener("click", (function(hotspot) {
        return function(e) {
          if (isDragging || isSliding || pinching || isPanning) return;
          e.stopPropagation();
          localNav = true;
          sendValue({type: "hotspot_click", urun_kodu: hotspot.urun_kodu || "", ts: Date.now(), page_index: currentIdx});
        };
      })(h));

      /* Magnifying glass icon as visual hint */
      var shorter = Math.min(hsW, hsH);
      var btnSize = Math.max(16, Math.min(34, Math.round(shorter * 0.35)));
      var fontSize = Math.max(10, Math.round(btnSize * 0.55));

      var btn = document.createElement("button");
      btn.className = "hotspot-search-btn";
      btn.style.width = btnSize + "px";
      btn.style.height = btnSize + "px";
      btn.style.fontSize = fontSize + "px";
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:65%;height:65%"><circle cx="10" cy="10" r="6"/><line x1="14.5" y1="14.5" x2="20" y2="20"/></svg>';
      div.appendChild(btn);
    } else {
      /* In popup mode: clicking hotspot area shows popup */
      div.addEventListener("click", (function(hotspot, el) {
        return function(e) {
          if (isDragging || isSliding || pinching || isPanning) return;
          e.stopPropagation();
          localNav = true;
          showPopup(hotspot, el);
        };
      })(h, div));
    }

    zoomContainer.appendChild(div);
  }
}

function showPopup(h, el) {
  if (activeHotspot) activeHotspot.classList.remove("active");
  el.classList.add("active");
  activeHotspot = el;

  popupCode.textContent = h.urun_kodu || "—";
  popupDesc.textContent = h.urun_ad || "";
  popupPrice.textContent = h.afis_fiyat ? (h.afis_fiyat + " TL") : "";
  popupPrice.style.display = h.afis_fiyat ? "block" : "none";

  var rect = el.getBoundingClientRect();
  var pw = 260;
  var left = rect.right + 8;
  if (left + pw > window.innerWidth) left = rect.left - pw - 8;
  if (left < 4) left = 4;
  var top = rect.top;
  if (top + 100 > window.innerHeight) top = window.innerHeight - 110;

  popup.style.left = left + "px";
  popup.style.top  = top + "px";
  popup.classList.add("visible");
}

function closePopup() {
  popup.classList.remove("visible");
  if (activeHotspot) {
    activeHotspot.classList.remove("active");
    activeHotspot = null;
  }
}

document.addEventListener("click", function(e) {
  if (!popup.contains(e.target) && !e.target.classList.contains("hotspot")) {
    closePopup();
  }
});
popupClose.addEventListener("click", closePopup);

/* ── Navigation with slide animation ── */
var isSliding = false;

btnPrev.addEventListener("click", function() { slideTo(currentIdx - 1); });
btnNext.addEventListener("click", function() { slideTo(currentIdx + 1); });

function goTo(idx) {
  if (idx >= 0 && idx < pages.length) showPage(idx, true);
}

/* Animated slide to a page (used by arrows, keyboard, swipe release) */
function slideTo(idx) {
  if (isSliding) return;
  if (idx < 0 || idx >= pages.length) return;
  if (idx === currentIdx) return;

  var direction = idx > currentIdx ? -1 : 1;  /* -1 = slide left, 1 = slide right */
  var wrapW = pageWrap.clientWidth;
  isSliding = true;

  /* Phase 1: slide current content out */
  slideTrack.classList.add("animating");
  slideTrack.style.transform = "translateX(" + (direction * wrapW) + "px)";

  slideTrack.addEventListener("transitionend", function onEnd(ev) {
    if (ev.target !== slideTrack || ev.propertyName !== "transform") return;
    slideTrack.removeEventListener("transitionend", onEnd);

    /* Phase 2: instantly position off-screen on opposite side, load new page */
    slideTrack.classList.remove("animating");
    slideTrack.style.transform = "translateX(" + (-direction * wrapW) + "px)";
    showPage(idx, true);

    /* Phase 3: slide new content in */
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        slideTrack.classList.add("animating");
        slideTrack.style.transform = "translateX(0)";

        slideTrack.addEventListener("transitionend", function onEnd2(ev2) {
          if (ev2.target !== slideTrack || ev2.propertyName !== "transform") return;
          slideTrack.removeEventListener("transitionend", onEnd2);
          slideTrack.classList.remove("animating");
          slideTrack.style.transform = "";
          isSliding = false;
        });
      });
    });
  });
}

/* Keyboard */
document.addEventListener("keydown", function(e) {
  if (e.key === "ArrowLeft") slideTo(currentIdx - 1);
  else if (e.key === "ArrowRight") slideTo(currentIdx + 1);
  else if (e.key === "Escape") { closePopup(); if (isZoomed()) resetZoom(true); }
});

/* ── Touch: swipe navigation + pinch-to-zoom + pan ── */
var touchStartX = 0;
var touchStartY = 0;
var touchOnHotspot = false;
var isDragging = false;
var dragOffset = 0;
var dirLocked = false;
var isHorizontal = false;
var touchStartTime = 0;

function getTouchDist(e) {
  var t = e.touches;
  var dx = t[0].clientX - t[1].clientX;
  var dy = t[0].clientY - t[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}
function getTouchMid(e) {
  var t = e.touches;
  return { x: (t[0].clientX + t[1].clientX) / 2, y: (t[0].clientY + t[1].clientY) / 2 };
}

pageWrap.addEventListener("touchstart", function(e) {
  if (isSliding) return;

  /* Two fingers → pinch-to-zoom */
  if (e.touches.length === 2) {
    e.preventDefault();
    pinching = true;
    isDragging = false;
    pinchStartDist = getTouchDist(e);
    pinchStartScale = zoomScale;
    pinchStartZoomX = zoomX;
    pinchStartZoomY = zoomY;
    var mid = getTouchMid(e);
    pinchMidX = mid.x;
    pinchMidY = mid.y;
    zoomContainer.classList.remove("zoom-animating");
    return;
  }

  /* Single finger */
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchStartTime = Date.now();
  isDragging = false;
  dragOffset = 0;
  dirLocked = false;
  isHorizontal = false;
  isPanning = false;

  /* If zoomed, prepare for pan */
  if (isZoomed()) {
    isPanning = true;
    panStartX = e.touches[0].clientX;
    panStartY = e.touches[0].clientY;
    panStartZoomX = zoomX;
    panStartZoomY = zoomY;
    zoomContainer.classList.remove("zoom-animating");
    return;
  }

  /* Check if touch started on a hotspot */
  var el = e.target;
  touchOnHotspot = false;
  while (el && el !== document.body) {
    if (el.classList && el.classList.contains("hotspot")) {
      touchOnHotspot = true;
      break;
    }
    el = el.parentElement;
  }

  /* Remove transition during drag */
  slideTrack.classList.remove("animating");
  slideTrack.style.transform = "";
}, {passive: false});

pageWrap.addEventListener("touchmove", function(e) {
  /* Pinch zoom — zoom centered on midpoint between fingers */
  if (pinching && e.touches.length === 2) {
    e.preventDefault();
    var dist = getTouchDist(e);
    var newScale = Math.max(1, Math.min(5, pinchStartScale * (dist / pinchStartDist)));
    var rect = pageWrap.getBoundingClientRect();
    var focusX = pinchMidX - rect.left;
    var focusY = pinchMidY - rect.top;

    /* Recompute from pinch start state to avoid drift */
    var ratio = newScale / pinchStartScale;
    zoomX = focusX - (focusX - pinchStartZoomX) * ratio;
    zoomY = focusY - (focusY - pinchStartZoomY) * ratio;
    zoomScale = newScale;
    clampPan();
    applyZoom(false);
    return;
  }

  /* Pan when zoomed */
  if (isPanning && isZoomed()) {
    e.preventDefault();
    var dx = e.touches[0].clientX - panStartX;
    var dy = e.touches[0].clientY - panStartY;
    zoomX = panStartZoomX + dx;
    zoomY = panStartZoomY + dy;
    clampPan();
    applyZoom(false);
    return;
  }

  /* Normal swipe navigation (not zoomed) */
  if (isSliding || pages.length <= 1) return;

  var dx = e.touches[0].clientX - touchStartX;
  var dy = e.touches[0].clientY - touchStartY;

  /* Lock direction on first significant move */
  if (!dirLocked && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) {
    dirLocked = true;
    isHorizontal = Math.abs(dx) > Math.abs(dy);
  }
  if (!isHorizontal) return;

  isDragging = true;
  dragOffset = dx;

  /* Resistance at edges */
  if ((currentIdx === 0 && dx > 0) || (currentIdx === pages.length - 1 && dx < 0)) {
    dragOffset = dx * 0.25;
  }

  slideTrack.style.transform = "translateX(" + dragOffset + "px)";
}, {passive: false});

pageWrap.addEventListener("touchend", function(e) {
  /* End pinch */
  if (pinching) {
    if (e.touches.length < 2) {
      pinching = false;
      /* Snap to 1x if close */
      if (zoomScale < 1.15) resetZoom(true);
    }
    return;
  }

  /* End pan */
  if (isPanning) {
    isPanning = false;
    return;
  }

  /* Normal swipe end */
  if (isSliding || !isDragging) {
    slideTrack.style.transform = "";
    return;
  }

  var wrapW = pageWrap.clientWidth;
  var threshold = wrapW * 0.08;
  var elapsed = Date.now() - touchStartTime;
  var velocity = Math.abs(dragOffset) / (elapsed || 1);
  var shouldSlide = Math.abs(dragOffset) > threshold || (velocity > 0.3 && Math.abs(dragOffset) > 15);

  if (shouldSlide) {
    var direction = dragOffset > 0 ? 1 : -1;
    var targetIdx = currentIdx - direction;

    if (targetIdx >= 0 && targetIdx < pages.length) {
      isSliding = true;
      slideTrack.classList.add("animating");
      slideTrack.style.transform = "translateX(" + (direction * wrapW) + "px)";

      slideTrack.addEventListener("transitionend", function onEnd(ev) {
        if (ev.target !== slideTrack || ev.propertyName !== "transform") return;
        slideTrack.removeEventListener("transitionend", onEnd);
        slideTrack.classList.remove("animating");
        slideTrack.style.transform = "translateX(" + (-direction * wrapW) + "px)";
        showPage(targetIdx, true);

        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            slideTrack.classList.add("animating");
            slideTrack.style.transform = "translateX(0)";
            slideTrack.addEventListener("transitionend", function onEnd2(ev2) {
              if (ev2.target !== slideTrack || ev2.propertyName !== "transform") return;
              slideTrack.removeEventListener("transitionend", onEnd2);
              slideTrack.classList.remove("animating");
              slideTrack.style.transform = "";
              isSliding = false;
            });
          });
        });
      });
    } else {
      snapBack();
    }
  } else {
    snapBack();
  }

  setTimeout(function() { isDragging = false; }, 0);
  dragOffset = 0;
});

function snapBack() {
  slideTrack.classList.add("animating");
  slideTrack.style.transform = "translateX(0)";
  slideTrack.addEventListener("transitionend", function onSnap(ev) {
    if (ev.target !== slideTrack || ev.propertyName !== "transform") return;
    slideTrack.removeEventListener("transitionend", onSnap);
    slideTrack.classList.remove("animating");
    slideTrack.style.transform = "";
  });
}

/* Boot */
window.parent.postMessage({
  isStreamlitMessage: true,
  type: "streamlit:componentReady",
  apiVersion: 1
}, "*");
</script>
